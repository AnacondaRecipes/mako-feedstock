{% set name = "Mako" %}
{% set version = "1.3.10" %}
{% set checksum = "99579a6f39583fa7e5630a28c3c1f440e4e97a414b80372649c0ce338da2ea28" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/M/Mako/mako-1.3.10.tar.gz
  sha256: {{ checksum }}

build:
  number: 0
  skip: true  # [py<38]
  preserve_egg_dir: true
  entry_points:
    - mako-render=mako.cmd:cmdline
  script: python -m pip install --no-deps --ignore-installed . -vv

requirements:
  host:
    - python
    - pip
    - setuptools >=47
    - wheel
  run:
    - python
    - importlib-metadata  # [py<38]
    - markupsafe >=0.9.2

test:
  imports:
    - mako
    - mako.ext
  requires:
    - pip
  commands:
    - pip check
    - mako-render --help

about:
  home: https://www.makotemplates.org/
  license_file: LICENSE
  license: MIT
  license_family: MIT
  license_url: https://github.com/sqlalchemy/mako/blob/main/LICENSE
  summary: A super-fast templating language that borrows the best ideas from the existing templating languages.
  doc_url: https://docs.makotemplates.org/en/latest/
  dev_url: https://github.com/sqlalchemy/mako

extra:
  recipe-maintainers:
    - pmlandwehr
