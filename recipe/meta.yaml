{% set name = "Mako" %}
{% set version = "1.3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 071eb4ab4c5010443152255d77db7faa6ce5916f35226eb02dc34479b6858069

build:
  number: 0
  skip: true  # [py<38]
  preserve_egg_dir: true
  entry_points:
    - mako-render=mako.cmd:cmdline
  script: python -m pip install --no-deps --no-build-isolation --ignore-installed . -vv

requirements:
  host:
    - python
    - pip
    - setuptools >=47
    - wheel
  run:
    - python
    - markupsafe >=0.9.2

test:
  source_files:
    - test
    - pyproject.toml
    - setup.cfg
  imports:
    - mako
    - mako.ext
  requires:
    - pytest
    - pip
  commands:
    - pip check
    - mako-render --help
    - pytest -v test

about:
  home: https://www.makotemplates.org
  license_file: LICENSE
  license: MIT
  license_family: MIT
  license_url: https://github.com/sqlalchemy/mako/blob/main/LICENSE
  summary: A super-fast templating language that borrows the best ideas from the existing templating languages.
  description: |
    Mako is a template library written in Python. It provides a familiar,
    non-XML syntax which compiles into Python modules for maximum performance.
  doc_url: https://docs.makotemplates.org
  dev_url: https://github.com/sqlalchemy/mako

extra:
  recipe-maintainers:
    - pmlandwehr
